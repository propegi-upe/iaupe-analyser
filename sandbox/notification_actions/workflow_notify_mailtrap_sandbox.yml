name: Sandbox - Notificacao Mailtrap

on:
  workflow_dispatch:
    inputs:
      to:
        description: "Destinatario de teste"
        required: false
        default: "to@example.com"
      start_date:
        description: "Data inicial (YYYY-MM-DD)"
        required: false
        default: "2026-04-01"
      deadline:
        description: "Prazo final (YYYY-MM-DD)"
        required: false
        default: "2026-05-01"
      days:
        description: "Marcos separados por espaco"
        required: false
        default: "30 15 7"
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: read

jobs:
  notify-sandbox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Executar sandbox de notificacao (Mailtrap)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DEFAULT_EMAIL_FROM: ${{ secrets.DEFAULT_EMAIL_FROM }}
          RECIPIENT_EMAIL: ${{ github.event.inputs.to || secrets.RECIPIENT_EMAIL }}
        run: |
          START_DATE="${{ github.event.inputs.start_date }}"
          DEADLINE="${{ github.event.inputs.deadline }}"
          DAYS="${{ github.event.inputs.days }}"
          TO="${{ github.event.inputs.to }}"

          START_DATE="${START_DATE:-2026-04-01}"
          DEADLINE="${DEADLINE:-2026-05-01}"
          DAYS="${DAYS:-30 15 7}"
          TO="${TO:-${RECIPIENT_EMAIL:-to@example.com}}"

          python sandbox/notification_actions/notify_mailtrap_sandbox.py \
            --start-date "$START_DATE" \
            --deadline "$DEADLINE" \
            --days $DAYS \
            --to "$TO" \
            --send
